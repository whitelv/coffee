<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Bar — Brewing</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <span class="header-logo">☕ Coffee Bar</span>
    <div class="header-user">
      <span id="user-name"></span>
    </div>
  </header>

  <div id="esp-banner" class="status-banner status-warning hidden">
    ⚠️ Hardware disconnected — reconnecting...
  </div>

  <main class="main-content brew-main">
    <div id="loading" class="brew-loading">
      <div class="spinner"></div>
      <p>Connecting to session…</p>
    </div>

    <div id="brew-ui" class="hidden">
      <!-- Step progress bar -->
      <div id="step-progress" class="step-progress"></div>

      <!-- Current step card -->
      <div class="card brew-card">
        <div id="step-type-icon" class="step-type-icon"></div>
        <h2 id="step-label" class="step-label"></h2>

        <!-- Weight step UI -->
        <div id="weight-ui" class="step-ui hidden">
          <div class="weight-gauge-wrap">
            <svg class="weight-gauge" viewBox="0 0 120 120">
              <circle class="gauge-track" cx="60" cy="60" r="50" />
              <circle id="gauge-fill" class="gauge-fill" cx="60" cy="60" r="50"
                      stroke-dasharray="314" stroke-dashoffset="314" />
            </svg>
            <div class="weight-display">
              <span id="weight-value">0.0</span>
              <span class="weight-unit">g</span>
            </div>
          </div>
          <p class="weight-target-label">Target: <strong id="weight-target">—</strong> g</p>
          <div id="weight-stable-badge" class="stable-badge hidden">✓ Stable</div>
        </div>

        <!-- Timer step UI -->
        <div id="timer-ui" class="step-ui hidden">
          <div class="timer-display">
            <span id="timer-value">00:00</span>
          </div>
          <div class="timer-bar-wrap">
            <div id="timer-bar" class="timer-bar"></div>
          </div>
        </div>

        <!-- Instruction step UI -->
        <div id="instruction-ui" class="step-ui hidden">
          <p id="instruction-text" class="instruction-text"></p>
        </div>

        <button id="next-btn" class="btn btn-primary next-btn hidden">
          Next Step →
        </button>
      </div>
    </div>

    <!-- Completion screen -->
    <div id="complete-screen" class="complete-screen hidden">
      <div class="complete-icon">🎉</div>
      <h2>Brew Complete!</h2>
      <p>Redirecting to history…</p>
    </div>

    <!-- Abandoned screen -->
    <div id="abandoned-screen" class="abandoned-screen hidden">
      <div class="abandoned-icon">⏱️</div>
      <h2>Session Timed Out</h2>
      <p>No activity detected. <a href="index.html">Start again</a></p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/brew.js"></script>
</body>
</html>
